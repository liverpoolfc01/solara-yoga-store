<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="800" viewBox="0 0 1440 800">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5ede0"/>
      <stop offset="50%" stop-color="#efe4d4"/>
      <stop offset="100%" stop-color="#e8d9c4"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0d2bb"/>
      <stop offset="100%" stop-color="#d4c4aa"/>
    </linearGradient>
    <radialGradient id="window" cx="75%" cy="15%" r="40%">
      <stop offset="0%" stop-color="#fff9f0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fff9f0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Wall -->
  <rect width="1440" height="600" fill="url(#wall)"/>
  <!-- Floor -->
  <rect y="600" width="1440" height="200" fill="url(#floor)"/>
  <!-- Window light -->
  <rect width="1440" height="800" fill="url(#window)"/>
  
  <!-- Large yoga mat center -->
  <g transform="translate(560,380) rotate(-2)">
    <rect x="0" y="0" width="320" height="420" rx="8" fill="#7d9178" opacity="0.8"/>
    <rect x="15" y="12" width="290" height="396" rx="5" fill="#90a58b" opacity="0.4"/>
    <!-- Mat lines -->
    <line x1="160" y1="30" x2="160" y2="390" stroke="#6a7d65" stroke-width="1.5" opacity="0.3"/>
    <line x1="40" y1="200" x2="280" y2="200" stroke="#6a7d65" stroke-width="0.5" opacity="0.2"/>
  </g>
  
  <!-- Second mat -->
  <g transform="translate(200,360) rotate(3)">
    <rect width="280" height="380" rx="8" fill="#a07060" opacity="0.6"/>
    <rect x="12" y="10" width="256" height="360" rx="5" fill="#b88878" opacity="0.3"/>
  </g>
  
  <!-- Plant - left -->
  <ellipse cx="80" cy="460" rx="70" ry="110" fill="#8aaa84" opacity="0.6"/>
  <ellipse cx="130" cy="420" rx="50" ry="85" fill="#9cba96" opacity="0.5"/>
  <ellipse cx="50" cy="390" rx="45" ry="75" fill="#7a9a72" opacity="0.55"/>
  
  <!-- Plant - right -->
  <ellipse cx="1360" cy="480" rx="60" ry="100" fill="#9cba96" opacity="0.45"/>
  <ellipse cx="1400" cy="430" rx="45" ry="80" fill="#8aaa84" opacity="0.4"/>
  
  <!-- Yoga blocks -->
  <rect x="620" y="560" width="40" height="65" rx="6" fill="#d9d0c4"/>
  <rect x="670" y="570" width="40" height="65" rx="6" fill="#e5ddd4"/>
  
  <!-- Water bottle -->
  <rect x="340" y="580" width="30" height="80" rx="15" fill="#2d4a6e" opacity="0.7"/>
  <circle cx="355" cy="580" r="14" fill="#3a5a80" opacity="0.5"/>
  
  <!-- Subtle brand text -->
  <text x="720" y="740" text-anchor="middle" font-family="Georgia,serif" font-size="72" fill="#c4b8a8" opacity="0.25" letter-spacing="24">SOLARA</text>
</svg>