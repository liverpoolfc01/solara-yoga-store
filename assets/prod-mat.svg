<svg xmlns="http://www.w3.org/2000/svg" width="600" height="750" viewBox="0 0 600 750">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6f4f0"/>
      <stop offset="100%" stop-color="#f6f4f0" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="fold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7d9178"/>
      <stop offset="50%" stop-color="#6a7d65"/>
      <stop offset="100%" stop-color="#7d9178"/>
    </linearGradient>
  </defs>
  <rect width="600" height="750" fill="url(#bg)"/>
  <!-- Large centered clothing item filling most of the frame -->
  <rect x="60" y="80" width="480" height="590" rx="16" fill="url(#fold)"/>
  <!-- Neckline / waistband detail -->
  <rect x="120" y="80" width="360" height="40" rx="8" fill="#6a7d65" opacity="0.5"/>
  <!-- Side seam shadow -->
  <rect x="500" y="120" width="20" height="510" rx="4" fill="rgba(0,0,0,0.08)"/>
  <!-- Center fold line -->
  <line x1="300" y1="120" x2="300" y2="630" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
  <!-- Subtle fabric texture lines -->
  <line x1="150" y1="200" x2="150" y2="600" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <line x1="450" y1="200" x2="450" y2="600" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <!-- Hem -->
  <rect x="60" y="640" width="480" height="30" rx="6" fill="#6a7d65" opacity="0.4"/>
  <!-- Label text -->
  <text x="300" y="720" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(0,0,0,0.2)" letter-spacing="4">YOGA MAT</text>
</svg>