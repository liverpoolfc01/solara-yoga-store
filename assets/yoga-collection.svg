<svg xmlns='http://www.w3.org/2000/svg' width='800' height='1000' viewBox='0 0 800 1000'>
  <defs>
    <linearGradient id='bg' x1='0%' y1='0%' x2='100%' y2='100%'>
      <stop offset='0%' style='stop-color:#faf7f2'/>
      <stop offset='100%' style='stop-color:#efe8dc'/>
    </linearGradient>
  </defs>
  <rect width='800' height='1000' fill='url(#bg)'/>

  <!-- Folded top/bra (plum) -->
  <rect x='180' y='120' width='280' height='200' rx='12' fill='#74415b' opacity='0.9'/>
  <rect x='200' y='140' width='240' height='160' rx='8' fill='#8a5170' opacity='0.7'/>
  <line x1='320' y1='140' x2='320' y2='300' stroke='#5e3549' stroke-width='1' opacity='0.5'/>
  <line x1='240' y1='220' x2='400' y2='220' stroke='#5e3549' stroke-width='1' opacity='0.4'/>

  <!-- Folded legging (sage) -->
  <rect x='370' y='350' width='240' height='340' rx='10' fill='#6f816e' opacity='0.85'/>
  <rect x='385' y='370' width='210' height='300' rx='6' fill='#829b80' opacity='0.6'/>

  <!-- Tank top (ivory) -->
  <rect x='120' y='420' width='200' height='260' rx='10' fill='#f5efe6'/>
  <rect x='135' y='440' width='170' height='220' rx='6' fill='#faf7f2'/>

  <!-- Scrunchie/accessory accent -->
  <circle cx='550' cy='180' r='45' fill='#a66f55' opacity='0.8'/>
  <circle cx='550' cy='180' r='28' fill='#bf8a72' opacity='0.5'/>

  <!-- Yoga block -->
  <rect x='560' y='600' width='90' height='140' rx='8' fill='#d9d0c4'/>
  <rect x='575' y='615' width='60' height='110' rx='4' fill='#e5ddd4'/>

  <!-- Water bottle -->
  <rect x='150' y='740' width='50' height='140' rx='25' fill='#28415f' opacity='0.8'/>
  <rect x='160' y='750' width='30' height='120' rx='15' fill='#3a5a80' opacity='0.5'/>
  <circle cx='175' cy='740' r='20' fill='#1e3350' opacity='0.7'/>

  <!-- Shadow under items -->
  <ellipse cx='400' cy='920' rx='280' ry='25' fill='#d4c9b8' opacity='0.5'/>
</svg>