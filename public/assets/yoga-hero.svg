<svg xmlns='http://www.w3.org/2000/svg' width='1440' height='960' viewBox='0 0 1440 960'>
  <defs>
    <linearGradient id='sky' x1='0%' y1='0%' x2='100%' y2='100%'>
      <stop offset='0%' style='stop-color:#fdf6f0'/>
      <stop offset='30%' style='stop-color:#f9ede2'/>
      <stop offset='70%' style='stop-color:#efe0d0'/>
      <stop offset='100%' style='stop-color:#e8d5c0'/>
    </linearGradient>
    <linearGradient id='sun' x1='0%' y1='0%' x2='100%' y2='100%'>
      <stop offset='0%' style='stop-color:#fff9f2'/>
      <stop offset='100%' style='stop-color:#f5e6d3'/>
    </linearGradient>
    <radialGradient id='glow' cx='70%' cy='30%' r='60%'>
      <stop offset='0%' style='stop-color:#fff;stop-opacity:0.9'/>
      <stop offset='100%' style='stop-color:#fff;stop-opacity:0'/>
    </radialGradient>
    <filter id='soft'><feGaussianBlur stdDeviation='2'/></filter>
  </defs>

  <!-- Background -->
  <rect width='1440' height='960' fill='url(#sky)'/>

  <!-- Sun glow -->
  <circle cx='1050' cy='280' r='400' fill='url(#glow)'/>

  <!-- Floor -->
  <rect x='0' y='680' width='1440' height='280' fill='#e8ddd0' opacity='0.7'/>
  <line x1='0' y1='680' x2='1440' y2='680' stroke='#ddd4c5' stroke-width='1'/>

  <!-- Yoga mat 1 -->
  <rect x='380' y='520' width='180' height='320' rx='4' fill='#7d8a75' transform='rotate(-8,470,680)' opacity='0.8'/>
  <rect x='390' y='530' width='160' height='300' rx='2' fill='#8fa88a' transform='rotate(-8,470,680)' opacity='0.6'/>

  <!-- Yoga mat 2 -->
  <rect x='780' y='500' width='180' height='340' rx='4' fill='#a66f55' transform='rotate(5,870,670)' opacity='0.8'/>
  <rect x='790' y='510' width='160' height='320' rx='2' fill='#bf8a72' transform='rotate(5,870,670)' opacity='0.6'/>

  <!-- Decorative plant left -->
  <ellipse cx='120' cy='600' rx='80' ry='120' fill='#8aaa84' opacity='0.5'/>
  <ellipse cx='80' cy='550' rx='60' ry='100' fill='#9cba96' opacity='0.4'/>
  <ellipse cx='160' cy='580' rx='50' ry='90' fill='#7d9a75' opacity='0.45'/>

  <!-- Decorative plant right -->
  <ellipse cx='1320' cy='580' rx='70' ry='110' fill='#9cba96' opacity='0.4'/>
  <ellipse cx='1360' cy='530' rx='50' ry='90' fill='#8aaa84' opacity='0.35'/>

  <!-- Floating yoga silhouette (simple geometric) -->
  <g transform='translate(900,400)' opacity='0.12'>
    <circle cx='0' cy='0' r='30' fill='#74415b'/>
    <ellipse cx='0' cy='60' rx='40' ry='70' fill='#74415b'/>
    <line x1='-35' y1='100' x2='-60' y2='160' stroke='#74415b' stroke-width='8' stroke-linecap='round'/>
    <line x1='35' y1='100' x2='60' y2='160' stroke='#74415b' stroke-width='8' stroke-linecap='round'/>
    <line x1='-20' y1='30' x2='-70' y2='-20' stroke='#74415b' stroke-width='7' stroke-linecap='round'/>
    <line x1='20' y1='30' x2='70' y2='-20' stroke='#74415b' stroke-width='7' stroke-linecap='round'/>
  </g>

  <!-- Small decorative circles (light particles) -->
  <circle cx='600' cy='300' r='3' fill='#d4c0a8' opacity='0.6'/>
  <circle cx='800' cy='200' r='4' fill='#d4c0a8' opacity='0.5'/>
  <circle cx='700' cy='400' r='2' fill='#d4c0a8' opacity='0.7'/>
  <circle cx='1000' cy='350' r='3' fill='#d4c0a8' opacity='0.4'/>
  <circle cx='500' cy='250' r='2' fill='#d4c0a8' opacity='0.5'/>
</svg>